; ============================================================
; PJSIP - Translation B2BUA
; Fritz!Box (DE) <-> Asterisk <-> Fritz!Box/Vodafone (IT-Ausgang)
; ============================================================

; --- Transports ---

[transport-udp4]
type = transport
protocol = udp
bind = 0.0.0.0:5060

[transport-udp6]
type = transport
protocol = udp
bind = :::5060

; ============================================================
; LEG A: Fritz!Box registriert sich hier als SIP-Client
; Fritz!Box: Telefonie -> Eigene Rufnummern -> Neue IP-Rufnummer
;   Registrar: <IPv6 dieses Servers>
;   Benutzername: fritzbox
;   Passwort: (siehe FRITZ_PASSWORD unten)
; ============================================================

[fritzbox]
type = endpoint
context = translator-in
disallow = all
allow = ulaw,alaw,g722
auth = fritzbox-auth
aors = fritzbox-aor
transport = transport-udp4
direct_media = no
rtp_symmetric = yes
force_rport = yes

[fritzbox-auth]
type = auth
auth_type = userpass
username = kellertreppesip
password = CHANGEME

[fritzbox-aor]
type = aor
max_contacts = 3
remove_existing = yes

[fritzbox-identify]
type = identify
endpoint = fritzbox
match = 192.168.178.1/32
match = fc00::/7

; ============================================================
; LEG B OPTION 1: Fritz!Box als Trunk fuer Ausgehend
; (Fritz!Box bleibt bei Vodafone angemeldet - einfachster Weg)
; Fritz!Box: Telefonie -> Telefoniegeraete -> Neues Geraet
;   SIP-Telefon, Benutzername: asterisk, Passwort: AST_SECRET
; ============================================================

[fritzbox-trunk]
type = endpoint
context = translator-out-result
disallow = all
allow = ulaw,alaw,g722
auth = fritzbox-trunk-auth
aors = fritzbox-trunk-aor
direct_media = no
rtp_symmetric = yes
force_rport = yes

[fritzbox-trunk-auth]
type = auth
auth_type = userpass
username = asterisk
password = CHANGEME

[fritzbox-trunk-aor]
type = aor
max_contacts = 2
contact = sip:192.168.178.1

[fritzbox-trunk-identify]
type = identify
endpoint = fritzbox-trunk
match = 192.168.178.1/32

; ============================================================
; LEG B OPTION 2: Direktregistrierung bei Vodafone SIP
; (Passwort aus Fritz!Box: Telefonie -> Eigene Rufnummern -> Bearbeiten)
; ============================================================

[vodafone-reg]
type = registration
outbound_auth = vodafone-auth
server_uri = sip:sipconnect.vodafone.de
client_uri = sip:933184899@sipconnect.vodafone.de
retry_interval = 60
contact_user = 933184899
; Auskommentiert bis Passwort bekannt:
; forbidden_retry_interval = 600

[vodafone-auth]
type = auth
auth_type = userpass
username = 933184899
; password = VODAFONE_SIP_PASSWORT   ; <-- eintragen wenn bekannt

[vodafone-trunk]
type = endpoint
context = translator-out-result
disallow = all
allow = ulaw,alaw,g722
outbound_auth = vodafone-auth
aors = vodafone-aor
direct_media = no

[vodafone-aor]
type = aor
contact = sip:192.168.178.1


; ============================================================
; Asterisk registriert sich als SIP-Telefon bei Fritz!Box
; Fritz!Box: Telefoniegeraete -> Neues Geraet -> IP-Telefon
;   Benutzername: kellertreppesip  Passwort: 2einfach
; ============================================================

[fritzbox-reg]
type = registration
outbound_auth = fritzbox-reg-auth
server_uri = sip:192.168.178.1
client_uri = sip:kellertreppesip@192.168.178.1
contact_user = kellertreppesip
retry_interval = 30
expiration = 120
transport = transport-udp4

[fritzbox-reg-auth]
type = auth
auth_type = userpass
username = kellertreppesip
password = CHANGEME

[fritzbox-out]
type = endpoint
context = translator-out-result
disallow = all
allow = ulaw,alaw,g722
outbound_auth = fritzbox-reg-auth
aors = fritzbox-out-aor
direct_media = no
from_user = kellertreppesip
from_domain = fritz.box
callerid = linuxsip <+4980425641873>
send_pai = yes
send_rpid = yes
rpid_immediate = yes
transport = transport-udp4

[fritzbox-out-aor]
type = aor
contact = sip:192.168.178.1

; ============================================================
; Linphone Softphone (lokaler Test-Extension)
; ============================================================

[linphone]
type = endpoint
context = from-internal
disallow = all
allow = ulaw,alaw,g722
auth = linphone-auth
aors = linphone
transport = transport-udp4
direct_media = no

[linphone-auth]
type = auth
auth_type = userpass
username = linphone
password = CHANGEME

[linphone]
type = aor
max_contacts = 1
remove_existing = yes

[linphone-identify]
type = identify
endpoint = linphone
match = 192.168.178.27/32

; ============================================================
; dus.net SIP-Trunk  — DID +4980424967
; Eingehend → from-dusnet, Ausgehend → PJSIP/%s@dusnet-trunk
; ============================================================

[dusnet-reg]
type = registration
outbound_auth = dusnet-auth
server_uri = sip:[2a04:2100:0:100::71]
client_uri = sip:000387841322@[2a04:2100:0:100::71]
contact_user = 000387841322
retry_interval = 60
expiration = 3600
transport = transport-udp6

[dusnet-auth]
type = auth
auth_type = userpass
username = 000387841322
password = CHANGEME

[dusnet-trunk]
type = endpoint
context = from-dusnet
disallow = all
allow = ulaw,alaw,g722
outbound_auth = dusnet-auth
aors = dusnet-aor
direct_media = no
dtmf_mode = rfc4733
timers = no
rtp_timeout = 0
rtp_timeout_hold = 0
from_user = 000387841322
from_domain = sip.dus.net
transport = transport-udp6

[dusnet-aor]
type = aor
contact = sip:[2a04:2100:0:100::71]

[dusnet-identify]
type = identify
endpoint = dusnet-trunk
match = 2a04:2100:0:100::71/128
