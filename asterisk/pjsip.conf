; ============================================================
; PJSIP — ipgate1 (82.165.41.91 / 2a02:2479:8f:e700::1)
; Vodafone Kabelfon +4980429659892
; ============================================================

[global]
type = global
endpoint_identifier_order = username,ip,anonymous

[transport-udp4]
type = transport
protocol = udp
bind = 0.0.0.0:5060
external_media_address = 82.165.41.91
external_signaling_address = 82.165.41.91
local_net = 10.9.0.0/24

[transport-udp6]
type = transport
protocol = udp
bind = :::5060

; ============================================================
; Vodafone Kabelfon — DID +4980429659892
; ============================================================

[vodafone-reg]
type = registration
outbound_auth = vodafone-auth
server_uri = sip:sip.kabelfon.vodafone.de
client_uri = sip:933184899@sipconnect.vodafone.de
contact_user = 933184899
retry_interval = 60
expiration = 3600
transport = transport-udp4

[vodafone-auth]
type = auth
auth_type = userpass
username = 933184899
password = CHANGEME

[vodafone-trunk]
type = endpoint
context = from-vodafone
disallow = all
allow = g722,ulaw,alaw
outbound_auth = vodafone-auth
aors = vodafone-aor
direct_media = no
dtmf_mode = rfc4733
timers = no
rtp_timeout = 0
rtp_timeout_hold = 0
from_user = 933184899
from_domain = sip.kabelfon.vodafone.de
callerid = +4980429659892 <+4980429659892>
send_pai = yes
send_rpid = yes
transport = transport-udp4
; 16 kHz zuerst, 8 kHz nur als Rueckfall: unsere Reihenfolge gewinnt,
; nicht die der Gegenstelle. keep:all behaelt ulaw/alaw als Fallback.
codec_prefs_incoming_offer = prefer:configured, operation:intersect, keep:all, transcode:allow
codec_prefs_outgoing_offer = prefer:configured, operation:intersect, keep:all, transcode:allow

[vodafone-aor]
type = aor
contact = sip:sip.kabelfon.vodafone.de

[vodafone-identify]
type = identify
endpoint = vodafone-trunk
match = sip.kabelfon.vodafone.de

