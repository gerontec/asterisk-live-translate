; ============================================================
; Bot-Interview-Dialplan — für test_bot_call.py
;
; Einbinden in extensions_translator.conf:
;   #include /etc/asterisk/extensions_bot.conf
;
; Ablauf:
;   AMI Originate → Channel: PJSIP/<dest>@fritzbox-out
;                   Context: bot-interview  Exten: s  Priority: 1
;
; Anrufer hört 3 deutsche Fragen (custom/bot_frage1-3),
; antwortet nach jeder Frage, Aufnahmen → /tmp/bot_answer1-3.wav
; ============================================================

[bot-interview]
exten => s,1,Answer()
 same => n,Wait(1.0)
 same => n,Playback(custom/bot_frage1)
 same => n,Wait(0.3)
 same => n,Record(/tmp/bot_answer1.wav,3,15)
 same => n,Playback(custom/bot_frage2)
 same => n,Wait(0.3)
 same => n,Record(/tmp/bot_answer2.wav,3,15)
 same => n,Playback(custom/bot_frage3)
 same => n,Wait(0.3)
 same => n,Record(/tmp/bot_answer3.wav,3,15)
 same => n,Playback(custom/bot_danke)
 same => n,Hangup()
