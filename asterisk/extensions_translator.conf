[outbound-fallback]
; ══════════════════════════════════════════════════════════════════
; Echo-Test-Nebenstellen: Deutsch sprechen -> Zielsprache hoeren.
; Schema: 20 + Laendervorwahl, durchgehend VIERSTELLIG (gleiche Laenge =
; keine Mehrdeutigkeit beim Overlap-Dialing). ru=2007 (Vorwahl 7 mit Null
; aufgefuellt), ka=2995 (Vorwahl 995 ist dreistellig).
;
; Der Translator liest die Zielsprache am SUFFIX der per AGI registrierten
; Nummer; die Restziffer "1" ist <=2-stellig und loest damit LOOPBACK_ECHO
; aus. Inferenz laeuft auf der Tesla P4 im dell (yt6.heissa.de:9095).
; Ansagen: /var/lib/asterisk/sounds/en/echotest<nst>.wav16 (Piper, 16 kHz).
; ══════════════════════════════════════════════════════════════════

exten => 2049,1,NoOp(Echo-Test DE->DE (Deutsch) -- Suffix 49)
 same => n,Answer()
 ; ohne Pause verpufft der Ansagenanfang, der RTP-Pfad steht noch nicht
 same => n,Wait(1)
 same => n,Playback(echotest2049)
 same => n,Playback(beep)
 same => n,Set(AS_UUID=${UUID()})
 same => n,AGI(notifyuuid.py,${AS_UUID},149)
 same => n,Set(CHANNEL(audioreadformat)=slin16)
 same => n,Set(CHANNEL(audiowriteformat)=slin16)
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n,Hangup()

