; ============================================================
; AudioSocket-Translator Dialplan
; UUID() erzeugt echtes RFC-4122-UUID  (app_audiosocket Pflicht)
; UNIQUEID→EXTEN-Mapping läuft über AMI-Newexten-Events in Python
; ============================================================


[from-internal]

; Internationale Rufnummern: +<Nummer><Sprachsuffix>  (z.B. +4917625257878 39)
exten => _+X.,1,NoOp(AudioSocket-Translator: ${EXTEN})
 same => n,Set(AS_UUID=${UUID()})
 same => n,NoOp(UUID gesetzt: ${AS_UUID})
 same => n,Set(AS_EXTEN=${EXTEN})
 same => n,AGI(notifyuuid.py,${AS_UUID},${EXTEN})
 same => n,Answer()
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n,Hangup()

; Vierstellig: zweistellige Nebenstelle + Sprachcode (z.B. 5039 = Nebenstelle 50, Italienisch)
exten => _XX39,1,NoOp(Translator intern IT: NB=${EXTEN:0:2})
 same => n,Set(AS_UUID=${UUID()})
 same => n,Set(AS_EXTEN=${EXTEN})
 same => n,AGI(notifyuuid.py,${AS_UUID},${EXTEN})
 same => n,Answer()
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n,Hangup()

exten => _XX99,1,NoOp(Translator intern RU: NB=${EXTEN:0:2})
 same => n,Set(AS_UUID=${UUID()})
 same => n,Set(AS_EXTEN=${EXTEN})
 same => n,AGI(notifyuuid.py,${AS_UUID},${EXTEN})
 same => n,Answer()
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n,Hangup()

[translator-in]
exten => _X.,1,NoOp(Fritz -> Translator: ${EXTEN})
 same => n,Set(AS_UUID=${UUID()})
 same => n,AGI(notifyuuid.py,${AS_UUID},${EXTEN})
 same => n,Answer()
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n,Hangup()

[audiosocket-out]
exten => s,1,NoOp(AS Outbound: ${PARTNER_UUID})
 same => n,Answer()
 same => n,AudioSocket(${PARTNER_UUID},127.0.0.1:9093)
 same => n,Hangup()

[outbound-test]
exten => s,1,Set(CALLERID(all)=+4980425641873 <+4980425641873>)
 same => n,Dial(PJSIP/+4917625257878@fritzbox-out,30,g)
 same => n,Hangup()

[from-dusnet]
; Eingehend von dus.net auf +4980424967
; Nach Annahme: Sprachcode per DTMF eingeben (z.B. 39 = Italienisch, 99 = Russisch)
exten => _X.,1,NoOp(dus.net eingehend: ${EXTEN})
 same => n,Answer()
 same => n,Playback(beep)
 same => n,Read(LANG_CODE,,2,,1,4)
 same => n,GotoIf($["${LANG_CODE}" = ""]?hangup)
 same => n,Set(AS_UUID=${UUID()})
 same => n,AGI(notifyuuid.py,${AS_UUID},${LANG_CODE})
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n(hangup),Hangup()
