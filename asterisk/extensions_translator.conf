; ============================================================
; AudioSocket-Translator Dialplan
; UUID() erzeugt echtes RFC-4122-UUID  (app_audiosocket Pflicht)
; UNIQUEID→EXTEN-Mapping läuft über AMI-Newexten-Events in Python
; ============================================================


[from-internal]

; Internationale Rufnummern: abnehmen, auf DTMF-Sprachcode warten (z.B. Telefonbuch: 017625257878,,39)
exten => _+X.,1,NoOp(Translator warte auf Sprachcode: ${EXTEN})
 same => n,Answer()
 same => n,Read(LANG_CODE,,3,s,1,5)
 same => n,GotoIf($["${LANG_CODE}" = ""]?hangup)
 same => n,Set(AS_UUID=${UUID()})
 same => n,Set(AS_EXTEN=${EXTEN}${LANG_CODE})
 same => n,AGI(notifyuuid.py,${AS_UUID},${AS_EXTEN})
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n(hangup),Hangup()

; Nationalformat 0... → +49... umschreiben, dann weiter wie internationale Nummern
exten => _0.,1,NoOp(Nationalformat: ${EXTEN})
 same => n,Goto(from-internal,+49${EXTEN:1},1)

; Interaktiv: *39 oder *7 → Beep → Rufnummer eingeben (Fritz!Box-kompatibel)
exten => *39,1,NoOp(Translator IT interaktiv)
 same => n,Set(LANG_CODE=39)
 same => n,Goto(translator-interactive,start,1)

exten => *7,1,NoOp(Translator RU interaktiv)
 same => n,Set(LANG_CODE=7)
 same => n,Goto(translator-interactive,start,1)

; Vierstellig: zweistellige Nebenstelle + Sprachcode (z.B. 5039 = Nebenstelle 50, Italienisch)
exten => _XX39,1,NoOp(Translator intern IT: NB=${EXTEN:0:2})
 same => n,Set(AS_UUID=${UUID()})
 same => n,Set(AS_EXTEN=${EXTEN})
 same => n,AGI(notifyuuid.py,${AS_UUID},${EXTEN})
 same => n,Answer()
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n,Hangup()

exten => _XX7,1,NoOp(Translator intern RU: NB=${EXTEN:0:2})
 same => n,Set(AS_UUID=${UUID()})
 same => n,Set(AS_EXTEN=${EXTEN})
 same => n,AGI(notifyuuid.py,${AS_UUID},${EXTEN})
 same => n,Answer()
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n,Hangup()

[translator-in]
exten => _X.,1,NoOp(Fritz -> Translator: ${EXTEN})
 same => n,Set(AS_UUID=${UUID()})
 same => n,AGI(notifyuuid.py,${AS_UUID},${EXTEN})
 same => n,Answer()
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n,Hangup()

[audiosocket-out]
exten => s,1,NoOp(AS Outbound: ${PARTNER_UUID})
 same => n,Answer()
 same => n,AudioSocket(${PARTNER_UUID},127.0.0.1:9093)
 same => n,Hangup()

[outbound-test]
exten => s,1,Set(CALLERID(all)=+4980425641873 <+4980425641873>)
 same => n,Dial(PJSIP/+4917625257878@fritzbox-out,30,g)
 same => n,Hangup()

[from-dusnet]
; Eingehend von dus.net auf +4980424967
; 1. Ansage in Landessprache des Anrufers (CallerID-Präfix → Sprache)
; 2. Whisper hört 7s zu, erkennt Zielrufnummer + Sprache
; 3. Fallback: DTMF-Eingabe (Zielnummer + Suffix, z.B. 01762525787839 dann #)
exten => _X.,1,NoOp(dus.net eingehend: ${EXTEN} CallerID: ${CALLERID(num)})
 same => n,Answer()
 ; Sprache aus CallerID ableiten → PROMPT_LANG (z.B. "de", "it", "ru")
 same => n,AGI(caller_lang.py,${CALLERID(num)})
 ; Ansage in Landessprache abspielen
 same => n,Playback(custom/nlu_prompt_${PROMPT_LANG})
 ; Sprachaufnahme: max 7s, endet nach 2s Stille oder DTMF-Taste
 same => n,Record(/tmp/ast_nlu_${UNIQUEID}.wav,2,7,qy)
 ; NLU: Whisper in Caller-Sprache → extrahiert Nummer + Suffix
 same => n,AGI(voice_nlu.py,/tmp/ast_nlu_${UNIQUEID}.wav,${PROMPT_LANG})
 same => n,GotoIf($["${DIAL_NUMBER}" != ""]?voicedial)
 ; --- Fallback: DTMF ---
 same => n,Playback(beep)
 same => n,Read(DIAL_STR,,15,s,1,10)
 same => n,GotoIf($["${DIAL_STR}" = ""]?hangup)
 same => n,Set(DIAL_NUMBER=${DIAL_STR})
 same => n,Set(LANG_SUFFIX=)
 ; --- Gemeinsamer Wähl-Pfad ---
 same => n(voicedial),Set(AS_UUID=${UUID()})
 same => n,AGI(notifyuuid.py,${AS_UUID},${DIAL_NUMBER}${LANG_SUFFIX})
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n(hangup),Hangup()

[translator-interactive]
exten => start,1,Answer()
 same => n,Playback(beep)
 same => n,Read(DIAL_NUM,,12,s,1,10)
 same => n,GotoIf($["${DIAL_NUM}" = ""]?hangup)
 same => n,Set(AS_UUID=${UUID()})
 same => n,Set(AS_EXTEN=${DIAL_NUM}${LANG_CODE})
 same => n,AGI(notifyuuid.py,${AS_UUID},${AS_EXTEN})
 same => n,AudioSocket(${AS_UUID},127.0.0.1:9093)
 same => n(hangup),Hangup()

[from-fritzbox]
; 523523-Nebenstellen: direkte Amtsholung ohne Übersetzung
exten => _0.,1,Dial(PJSIP/+49${EXTEN:1}@fritzbox-out,60)
 same => n,Hangup()

exten => _+X.,1,Dial(PJSIP/${EXTEN}@fritzbox-out,60)
 same => n,Hangup()
