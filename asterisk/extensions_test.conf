; ============================================================
; Test-Dialplan  — nur für Integration-Test, nie für Produktion
;
; Einbinden in extensions.conf / extensions_translator.conf:
;   #include extensions_test.conf
;
; Dialplan-Reload (kein Neustart):
;   asterisk -rx "dialplan reload"
; ============================================================

; ── Deutsche Eingangsseite ────────────────────────────────────
; AMI Originate:
;   Channel:  Local/s@test-de-inject
;   Context:  translator-in
;   Exten:    +39<nummer>39   (Suffix 39 = Italienisch)
;   Priority: 1
;
; Der Local-Channel überbrückt B-Seite (dieser Kontext) mit der
; A-Seite, die in translator-in läuft (UUID-AGI → AudioSocket).
; Playback sendet deutsches WAV an den Übersetzer;
; was der Übersetzer zurückspielt (ital. TTS) wird in rx aufgenommen.

[test-de-inject]
exten => s,1,Answer()
 same => n,Wait(0.3)
 same => n,MixMonitor(/tmp/test_mix_de.wav,r(/tmp/test_rx_de.wav)t(/tmp/test_tx_de.wav))
 same => n,Playback(custom/test_de_input)
 same => n,Wait(60)
 same => n,StopMixMonitor()
 same => n,Hangup()

; ── Italienische Gegenseite ───────────────────────────────────
; Wird vom Übersetzer via TEST_TRUNK=Local/%s@test-it-phones angerufen.
; AMI Originate (intern durch Übersetzer):
;   Channel:     Local/<nummer>@test-it-phones
;   Application: AudioSocket
;   Data:        <uuid>,127.0.0.1:9093
;
; B-Seite dieses Local-Channels spielt italienisches WAV,
; empfängt deutsche Übersetzungs-TTS und nimmt sie auf.

[test-it-phones]
exten => _.,1,Answer()
 same => n,Wait(0.3)
 same => n,MixMonitor(/tmp/test_mix_it.wav,r(/tmp/test_rx_it.wav)t(/tmp/test_tx_it.wav))
 same => n,Playback(custom/test_it_input)
 same => n,Wait(60)
 same => n,StopMixMonitor()
 same => n,Hangup()
